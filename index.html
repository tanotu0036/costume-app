<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>保育園 衣装管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* パステルメイン */
  --gr:#5b9bd5;--gr2:#4a8bc4;--gr-l:#e8f2fb;--gr-b:#b8d8f5;
  /* アクセント（ピンク） */
  --rd:#e8729a;--rd-l:#fdeef4;--rd-b:#f5b8cf;
  /* イエロー */
  --gd:#e8b84b;--gd-l:#fdf7e3;
  /* 背景 */
  --bg:#f7f5fc;--bg2:#ffffff;--bg3:#f0eef8;
  /* テキスト */
  --tx:#3d3566;--tx2:#6b63a8;--tx3:#a89ec8;
  /* ボーダー */
  --br:#e0dcf0;--br2:#c8c2e8;
  /* ナビ・ヘッダー */
  --hdr-bg:linear-gradient(135deg,#a78bdc 0%,#7eb8e8 100%);
  --r:10px;--r-sm:7px;--nav-h:58px;--hdr-h:52px;
  font-family:'Noto Sans JP',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg2);position:relative;overflow:hidden}

.hdr{height:var(--hdr-h);background:var(--hdr-bg);color:#fff;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10}
.hdr-back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px;display:flex;align-items:center}
.hdr-title{font-size:15px;font-weight:700;flex:1;display:flex;align-items:center;gap:6px}
.hdr-icon{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px;display:flex;align-items:center}
.hidden{display:none !important}

.page{flex:1;overflow-y:auto;display:none;flex-direction:column;background:var(--bg)}
.page.active{display:flex}

.bottom-nav{height:var(--nav-h);background:var(--bg2);border-top:0.5px solid var(--br);display:flex;flex-shrink:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--tx3);font-size:10px;font-weight:500;cursor:pointer;font-family:inherit}
.nav-btn i{font-size:22px}
.nav-btn.active{color:var(--rd)}

.fab{position:absolute;bottom:calc(var(--nav-h) + 16px);right:16px;width:50px;height:50px;border-radius:50%;background:var(--rd);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 3px 10px rgba(232,114,154,.4);z-index:20}
.fab:active{transform:scale(.93)}

.section{padding:10px 12px 2px}
.section-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:5px;margin-bottom:6px}
.section-title i{font-size:12px;color:var(--gr)}
.card{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);overflow:hidden;margin:0 12px 8px}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:0.5px solid var(--br)}
.row:last-child{border-bottom:none}
.row-label{font-size:11px;color:var(--tx2)}
.row-value{font-size:13px;font-weight:500;text-align:right;max-width:62%}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-nishi{background:#dff0ff;color:#2980b9}
.badge-hara{background:#d5f5e3;color:#1e8449}
.badge-tano{background:#fef9e7;color:#b7770d}
.badge-chiku{background:#fde8f0;color:#c0396b}
.badge-active{background:#d5f5e3;color:#1e8449}
.badge-repair{background:#fef9e7;color:#b7770d}
.badge-retire{background:#f2f2f2;color:#7f8c8d}

.empty{padding:40px 20px;text-align:center;color:var(--tx3)}
.empty i{font-size:40px;display:block;margin-bottom:10px;color:var(--br2)}
.empty p{font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--tx3);font-size:13px}
.loading i{font-size:20px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.field{margin-bottom:10px}
.field-label{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.field-label i{font-size:12px;color:var(--gr)}
.req{font-size:9px;background:var(--rd);color:#fff;padding:1px 4px;border-radius:3px;font-weight:700}
.field input,.field textarea,.field select{width:100%;border:0.5px solid var(--br2);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;font-family:inherit;background:var(--bg2);color:var(--tx);outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gr)}
.field textarea{height:60px;resize:none;line-height:1.5}

.chip-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.chip-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.chip{height:36px;border-radius:var(--r-sm);border:0.5px solid var(--br2);background:var(--bg3);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit}
.chip i{font-size:13px}
.chip.on{background:var(--gr-l);border-color:var(--gr);color:var(--gr2)}

.btn-primary{width:100%;height:44px;border-radius:var(--r);background:var(--rd);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}
.btn-primary:disabled{opacity:.6}
.btn-sub{height:40px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg);color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}

.filter-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;background:var(--bg2);border-bottom:0.5px solid var(--br);flex-shrink:0}
.filter-bar::-webkit-scrollbar{display:none}
.filter-pill{height:28px;padding:0 12px;border-radius:14px;border:0.5px solid var(--br2);background:var(--bg3);color:var(--tx2);font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:inherit;flex-shrink:0}
.filter-pill.on{background:var(--gr);border-color:var(--gr);color:#fff;font-weight:700}

/* 衣装グリッド */
.costume-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 12px}
.costume-card{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);overflow:hidden;cursor:pointer}
.costume-card:active{border-color:var(--gr)}
.costume-img{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.costume-img img{width:100%;height:100%;object-fit:cover}
.costume-img i{font-size:40px;color:var(--br2)}
.costume-img .pcount{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px}
.sdot{position:absolute;top:6px;left:6px;width:9px;height:9px;border-radius:50%;border:1.5px solid #fff}
.sdot-active{background:var(--gr)}.sdot-repair{background:var(--gd)}.sdot-retire{background:#888}
.costume-meta{padding:7px 9px 8px}
.costume-code{font-size:10px;color:var(--tx3);font-weight:500;margin-bottom:2px}
.costume-name{font-size:12px;font-weight:500;margin-bottom:4px;min-height:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.costume-loc{font-size:10px;color:var(--tx2);display:flex;align-items:center;gap:3px}
.costume-loc i{font-size:11px}

/* 写真エリア */
.photo-main{width:100%;aspect-ratio:4/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0}
.photo-main img{width:100%;height:100%;object-fit:contain}
.photo-main i{font-size:64px;color:var(--br2)}
.thumb-row{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid var(--br);flex-shrink:0}
.thumb-row::-webkit-scrollbar{display:none}
.thumb-item{width:54px;height:54px;border-radius:8px;background:var(--bg3);border:1.5px solid transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;font-size:20px;color:var(--br2);position:relative}
.thumb-item img{width:100%;height:100%;object-fit:cover}
.thumb-item.active{border-color:var(--gr)}
.thumb-add{border:1px dashed var(--br2);background:none;cursor:pointer}
.thumb-del{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--rd);color:#fff;border-radius:50%;border:1.5px solid #fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}

/* タイムライン */
.timeline{padding:4px 12px}
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--br)}
.tl-item:last-child{border-bottom:none}
.tl-year{font-size:11px;font-weight:700;color:var(--gr);min-width:38px;margin-top:1px}
.tl-info{flex:1;min-width:0}
.tl-title{font-size:12px;font-weight:500}
.tl-sub{font-size:11px;color:var(--tx2);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tl-memo{font-size:11px;color:var(--tx2);background:var(--bg3);border-radius:4px;padding:3px 7px;margin-top:4px;border-left:2px solid var(--gr-b)}

/* 演目一覧 */
.rep-year-hdr{padding:8px 12px;background:linear-gradient(90deg,var(--gr-l),var(--rd-l));font-size:11px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:5;border-bottom:0.5px solid var(--br)}
.rep-year-hdr i{font-size:13px;color:var(--gr)}
.rep-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:0.5px solid var(--br);cursor:pointer;background:var(--bg2)}
.rep-item:active{background:var(--bg3)}
.rep-icon-wrap{width:36px;height:36px;border-radius:8px;background:var(--gr-l);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rep-icon-wrap i{font-size:18px;color:var(--gr)}
.rep-info{flex:1;min-width:0}
.rep-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rep-sub{font-size:11px;color:var(--tx2);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rep-count{font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:3px;margin-top:3px}

/* ドラムロール */

/* モーダル */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:85%;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.modal-hdr{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--br);flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;color:var(--tx3);cursor:pointer}
.modal-body{flex:1;overflow-y:auto;padding:12px 16px}
.modal-footer{padding:10px 16px 14px;border-top:0.5px solid var(--br);display:flex;gap:8px;flex-shrink:0}
.btn-cancel{height:40px;padding:0 16px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg);color:var(--tx2);font-size:13px;cursor:pointer;font-family:inherit}
.btn-ok{flex:1;height:40px;border-radius:var(--r);background:var(--gr);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .2s}

/* 選択リスト */
.sel-list{max-height:220px;overflow-y:auto;border:0.5px solid var(--br);border-radius:var(--r-sm)}
.sel-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:0.5px solid var(--br);cursor:pointer}
.sel-item:last-child{border-bottom:none}
.sel-item.checked{background:var(--gr-l)}
.sel-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--br2);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg2)}
.sel-item.checked .sel-check{background:var(--gr);border-color:var(--gr)}
.sel-check i{font-size:11px;color:#fff}
.sel-thumb{width:30px;height:30px;border-radius:5px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--br2);overflow:hidden}
.sel-thumb img{width:100%;height:100%;object-fit:cover}
.sel-bar{padding:6px 12px;background:var(--gr-l);font-size:11px;color:var(--gr);font-weight:500;display:flex;justify-content:space-between;border-radius:0 0 var(--r-sm) var(--r-sm);margin-top:-1px}

/* ドロップダウンメニュー（3点リーダー） */
.menu-pop{position:absolute;top:48px;right:10px;background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:40;overflow:hidden;min-width:160px}
.menu-item{display:flex;align-items:center;gap:10px;padding:11px 14px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--br);background:var(--bg2)}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:var(--bg3)}
.menu-item i{font-size:16px;color:var(--tx2)}
.menu-item.danger{color:var(--rd)}
.menu-item.danger i{color:var(--rd)}

/* トースト */
.toast{position:absolute;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:100;white-space:nowrap;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}

/* 設定 */
.order-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border:0.5px solid var(--br);border-radius:var(--r-sm);margin-bottom:6px;background:var(--bg2);font-size:13px}
.order-item.mine{border-color:var(--rd);background:var(--rd-l);color:var(--rd);font-weight:700}
.drag-handle{font-size:18px;color:var(--tx3)}

/* 演目グリッドカード */
.rep-card{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--r);overflow:hidden;cursor:pointer}
.rep-card:active{border-color:var(--gr)}
.rep-card-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative}
.rep-card-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px}
.rep-card-icon.badge-nishi{background:linear-gradient(135deg,#dff0ff,#b8d8f5)}
.rep-card-icon.badge-hara{background:linear-gradient(135deg,#d5f5e3,#a8e6c3)}
.rep-card-icon.badge-tano{background:linear-gradient(135deg,#fef9e7,#fdeabb)}
.rep-card-icon.badge-chiku{background:linear-gradient(135deg,#fde8f0,#f5b8cf)}
.rep-card-icon i{color:#fff;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}

/* 小アイコンボタン（グリッド内） */
.icon-sm{width:22px;height:22px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;background:rgba(255,255,255,.85);color:var(--tx2)}
.icon-sm.danger{background:rgba(232,114,154,.85);color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
